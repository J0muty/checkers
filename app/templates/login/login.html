<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - TheCheckers</title>
    <link rel="stylesheet" href="/static/login/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="mobile-menu">
        <i class="fa-solid fa-xmark mobile-menu-close"></i>
        <a href="/" class="mobile-home">Главная</a>
        <a href="/register" class="mobile-register">Регистрация</a>
    </div>
    <main>
        <div class="form-container">
            <a href="/"><i class="fa-solid fa-arrow-left back-icon"></i></a>
            <h2>Вход</h2>
            <form action="/login" method="post">
                <div class="form-group">
                    <div class="input-container">
                        <input type="text" id="username" name="username" placeholder=" " required>
                        <span class="floating-label">Логин</span>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-container">
                        <input type="password" id="password" name="password" placeholder=" " required>
                        <span class="floating-label">Пароль</span>
                    </div>
                </div>
                <button type="submit">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
        </div>
    </main>
    <script type="module" src="/static/login/init.js"></script>
</body>
</html>
